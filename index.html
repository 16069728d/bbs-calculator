<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Calculator | Physiotherapy Department</title>
    <style>
        :root {
            --primary-blue: #005eb8; /* Clinical Blue */
            --bg-gray: #f4f7f9;
            --locked-gray: #e9ecef;
            --text-dark: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-gray); color: var(--text-dark); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-top: 0; }
        .question-block { margin-bottom: 20px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; transition: all 0.3s ease; }
        .question-block.locked { background-color: var(--locked-gray); opacity: 0.7; pointer-events: none; border-color: #ccc; }
        .question-title { font-weight: bold; margin-bottom: 10px; display: block; }
        .options { display: flex; justify-content: space-between; gap: 5px; }
        .option-item { flex: 1; text-align: center; }
        .option-item input { margin-bottom: 5px; }
        .score-display { position: sticky; top: 0; background: var(--primary-blue); color: white; padding: 15px; border-radius: 8px; text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; z-index: 100; }
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: opacity 0.2s; }
        .btn-reset { background-color: #6c757d; color: white; }
        .btn-home { background-color: #007bff; color: white; }
        button:hover { opacity: 0.9; }
        .clinical-note { font-size: 0.85rem; color: #666; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-display">Total BBS Score: <span id="total-score">0</span> / 56</div>
    
    <h1>Berg Balance Scale</h1>
    <p>Clinically optimized for ward administration.</p>

    <form id="bbs-form">
        <div id="questions-container"></div>
    </form>

    <div class="button-group">
        <button type="button" class="btn-reset" onclick="resetForm()">Reset All</button>
        <button type="button" class="btn-home" onclick="location.href='https://github.com/16069728d/bbs-calculator'">Back to Home</button>
    </div>
</div>

<script>
    const items = [
        "Sitting to standing",
        "Standing unsupported (2 min)",
        "Sitting with back unsupported (2 min)",
        "Standing to sitting",
        "Transfers",
        "Standing unsupported with eyes closed (10s)",
        "Standing unsupported with feet together",
        "Reaching forward with outstretched arm",
        "Pick up object from floor",
        "Turning to look behind over left/right shoulders",
        "Turn 360 degrees",
        "Place alternate foot on step or stool (8 times)",
        "Standing unsupported one foot in front (tandem)",
        "Standing on one leg"
    ];

    function init() {
        const container = document.getElementById('questions-container');
        items.forEach((item, index) => {
            const qNum = index + 1;
            const html = `
                <div class="question-block" id="block-q${qNum}">
                    <span class="question-title">${qNum}. ${item}</span>
                    <div class="options">
                        ${[0, 1, 2, 3, 4].map(score => `
                            <div class="option-item">
                                <input type="radio" name="q${qNum}" value="${score}" onchange="handleLogic()">
                                <br><small>${score}</small>
                            </div>
                        `).join('')}
                    </div>
                    ${qNum === 2 ? '<div class="clinical-note">If score is 4, Item 3 is auto-filled.</div>' : ''}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    function handleLogic() {
        const form = document.forms['bbs-form'];
        const q2 = parseInt(form.elements['q2']?.value);

        // 1. REFRESH STATE: Unlock everything first to fix the "correction bug"
        for (let i = 1; i <= 14; i++) {
            unlockItem(i);
        }

        // 2. CLINICAL RULE: If Q2 (Standing) is 4 -> Q3 (Sitting) is 4 & Locked
        // Ref: Official BBS administration manual
        if (q2 === 4) {
            lockAndSetItem(3, 4);
        }

        // 3. CLINICAL RULE: If Q2 (Standing) is 0 -> Dynamic standing (Q6-Q14) are 0
        if (q2 === 0) {
            for (let i = 6; i <= 14; i++) {
                lockAndSetItem(i, 0);
            }
        }

        // NOTE: Q3 logic removed based on consensus for MSK/Hip pathology patients
        
        calculateTotal();
    }

    function lockAndSetItem(qNum, value) {
        const block = document.getElementById(block-q${qNum});
        const inputs = document.getElementsByName(q${qNum});
        
        block.classList.add('locked');
        inputs.forEach(input => {
            input.checked = (parseInt(input.value) === value);
        });
    }

    function unlockItem(qNum) {
        const block = document.getElementById(block-q${qNum});
        block.classList.remove('locked');
    }

    function calculateTotal() {
        const formData = new FormData(document.getElementById('bbs-form'));
        let total = 0;
        for (let value of formData.values()) {
            total += parseInt(value);
        }
        document.getElementById('total-score').innerText = total;
    }

    function resetForm() {
        document.getElementById('bbs-form').reset();
        handleLogic(); // Re-run logic to clear locks
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    init();
</script>

</body>
</html>
