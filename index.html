<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Calculator | PT Department</title>
    <style>
        :root {
            --ha-blue: #007b85; 
            --bg-light: #f4f7f9;
            --locked-bg: #e9ecef;
            --text-main: #2d3436;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .calculator-card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .header {
            background: var(--ha-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 1.4rem; }

        .score-banner {
            position: sticky;
            top: 0;
            background: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 3px solid var(--ha-blue);
            z-index: 1000;
        }

        .item-container { padding: 15px; }

        .question-block {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dfe6e9;
            transition: 0.2s;
        }

        .question-block.locked {
            background-color: var(--locked-bg);
            opacity: 0.6;
            pointer-events: none;
        }

        .question-label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
        }

        .option { text-align: center; flex: 1; }
        .option input { cursor: pointer; width: 18px; height: 18px; }

        .footer-btns {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #f8f9fa;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset { background: #636e72; color: white; }
        .btn-home { background: var(--ha-blue); color: white; }

        .clinical-hint {
            font-size: 0.7rem;
            color: #d63031;
            font-weight: bold;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>Berg Balance Scale</h1>
        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.9;">Professional Clinical Edition</p>
    </div>

    <div class="score-banner">
        Total BBS Score: <span id="total-score">0</span> / 56
    </div>

    <div class="item-container">
        <form id="bbsForm">
            <div id="questions-list">
                </div>
        </form>
    </div>

    <div class="footer-btns">
        <button type="button" class="btn-reset" onclick="resetCalculator()">Reset All</button>
        <button type="button" class="btn-home" onclick="location.reload()">Refresh Page</button>
    </div>
</div>

<script>
    const bbsItems = [
        "Sitting to standing",
        "Standing unsupported (2 min)",
        "Sitting with back unsupported (2 min)",
        "Standing to sitting",
        "Transfers",
        "Standing unsupported with eyes closed (10 sec)",
        "Standing unsupported with feet together",
        "Reaching forward with outstretched arm",
        "Pick up object from floor",
        "Turning to look behind over shoulders",
        "Turn 360 degrees",
        "Place alternate foot on step (8 times)",
        "Standing unsupported one foot in front",
        "Standing on one leg"
    ];

    // Ensure DOM is fully loaded before running script
    document.addEventListener('DOMContentLoaded', function() {
        renderQuestions();
    });

    function renderQuestions() {
        const list = document.getElementById('questions-list');
        list.innerHTML = ""; // Clear existing

        bbsItems.forEach((text, i) => {
            const qNum = i + 1;
            const block = document.createElement('div');
            block.className = 'question-block';
            block.id = `block-q${qNum}`;

            let hint = "";
            if(qNum === 2) hint = "Score 4 → Auto-fills Item 3 (BBS Protocol)";
            if(qNum === 6) hint = "Requires Q2 ability.";

            block.innerHTML = `
                <span class="question-label">${qNum}. ${text}</span>
                <div class="options-row">
                    ${[0, 1, 2, 3, 4].map(val => `
                        <div class="option">
                            <input type="radio" name="q${qNum}" value="${val}" onchange="applyClinicalLogic()">
                            <br><small>${val}</small>
                        </div>
                    `).join('')}
                </div>
                ${hint ? `<span class="clinical-hint">${hint}</span>` : ''}
            `;
            list.appendChild(block);
        });
    }

    function applyClinicalLogic() {
        const form = document.getElementById('bbsForm');
        
        // 1. Reset all locks first (Solves the "Correction Bug")
        for (let i = 1; i <= 14; i++) {
            document.getElementById(`block-q${i}`).classList.remove('locked');
        }

        // 2. Get value of Q2
        const q2Radio = document.querySelector('input[name="q2"]:checked');
        const q2Val = q2Radio ? parseInt(q2Radio.value) : null;

        // 3. CLINICAL RULE: Q2=4 -> Q3 is 4 & Locked
        if (q2Val === 4) {
            setAndLock('q3', 4);
        }

        // 4. CLINICAL RULE: Q2=0 -> Q6-Q14 are 0 & Locked
        if (q2Val === 0) {
            for (let i = 6; i <= 14; i++) {
                setAndLock('q' + i, 0);
            }
        }

        updateTotal();
    }

    function setAndLock(qName, value) {
        const radios = document.getElementsByName(qName);
        const block = document.getElementById(`block-${qName}`);
        
        radios.forEach(r => {
            if (parseInt(r.value) === value) {
                r.checked = true;
            }
        });
        if (block) block.classList.add('locked');
    }

    function updateTotal() {
        let total = 0;
        const checked = document.querySelectorAll('input[type="radio"]:checked');
        checked.forEach(opt => {
            total += parseInt(opt.value);
        });
        document.getElementById('total-score').innerText = total;
    }

    function resetCalculator() {
        document.getElementById('bbsForm').reset();
        // Remove all locks manually
        for (let i = 1; i <= 14; i++) {
            document.getElementById(`block-q${i}`).classList.remove('locked');
        }
        updateTotal();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
