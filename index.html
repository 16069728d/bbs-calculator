<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Clinical Tool | PT Dept</title>
    <style>
        :root {
            --ha-blue: #007b85; 
            --bg-light: #f4f7f9;
            --locked-bg: #e9ecef;
            --text-main: #2d3436;
            --border-color: #dfe6e9;
            --risk-low: #27ae60;
            --risk-med: #f39c12;
            --risk-high: #d63031;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
        }

        .calculator-card {
            max-width: 700px;
            margin: 0 auto 180px auto; 
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: block !important;
        }

        .header {
            background: var(--ha-blue);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 1.3rem; }

        .item-container { padding: 15px; min-height: 300px; }

        .question-block {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #fff;
        }

        .question-block.locked {
            background-color: var(--locked-bg);
            opacity: 0.7;
            pointer-events: none;
        }

        .question-label {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--ha-blue);
            display: block;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .options-list { display: flex; flex-direction: column; gap: 8px; }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 6px;
            background: #f9f9f9;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .option-item:hover { background: #f1f1f1; }
        .option-item input { width: 22px; height: 22px; margin-top: 2px; flex-shrink: 0; cursor: pointer; }
        .option-text { font-size: 0.95rem; line-height: 1.4; }
        .score-badge { font-weight: bold; color: var(--ha-blue); margin-right: 5px; }

        /* Results Footer */
        .results-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            padding: 15px;
            text-align: center;
            z-index: 9999;
            border-top: 4px solid var(--ha-blue);
        }

        .score-row { font-size: 1.6rem; font-weight: 900; margin-bottom: 5px; color: var(--text-main); }
        
        .risk-status {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #bdc3c7;
            margin-bottom: 10px;
        }

        .incomplete-warning {
            color: #d63031;
            font-size: 0.85rem;
            font-weight: bold;
            min-height: 1.2em;
            margin-bottom: 10px;
        }

        .action-btns { display: flex; gap: 10px; justify-content: center; }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-reset { background: #636e72; color: white; }
        .btn-home { background: var(--ha-blue); color: white; }

        #load-error-btn {
            display: none;
            margin: 20px auto;
            background: #e67e22;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>Berg Balance Scale (BBS)</h1>
        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.9;">Professional Clinical Toolkit</p>
    </div>

    <button id="load-error-btn" onclick="buildForm()">Items missing? Click to Force Load</button>

    <div class="item-container">
        <form id="bbsForm">
            <div id="questions-list">
                <p style="text-align:center; padding:50px; color:#636e72;">Initializing Assessment items...</p>
            </div>
        </form>
    </div>
</div>

<div class="results-footer">
    <div class="score-row">Total: <span id="total-score">0</span> / 56</div>
    <div id="risk-status" class="risk-status">Awaiting Data</div>
    <div id="incomplete-msg" class="incomplete-warning"></div>
    
    <div class="action-btns">
        <button type="button" class="btn-reset" onclick="resetCalculator()">Reset Form</button>
        <button type="button" class="btn-home" onclick="window.location.href='https://16069728d.github.io/E-doc-outcomes-calculators/'">Back to Home</button>
    </div>
</div>

<script>
    // Complete BBS Item Content
    const bbsData = [
        { name: "Sitting to standing", criteria: ["Able to stand without hands; independent", "Independent with hands", "Independent using hands after several tries", "Needs minimal assist to stand/stabilize", "Needs moderate/maximal assist"] },
        { name: "Standing unsupported (2 min)", criteria: ["Able to stand safely 2 mins", "Able to stand 2 mins with supervision", "Able to stand 30 secs unsupported", "Needs several tries to stand 30 secs unsupported", "Unable to stand 30 secs unassisted"] },
        { name: "Sitting back unsupported (2 min)", criteria: ["Safe/secure for 2 mins", "Able to sit 2 mins under supervision", "Able to sit 30 secs", "Able to sit 10 secs", "Unable to sit without support 10 secs"] },
        { name: "Standing to sitting", criteria: ["Sits safely with minimal use of hands", "Controls descent using hands", "Uses back of legs against chair to control descent", "Sits independently but has uncontrolled descent", "Needs assist to sit"] },
        { name: "Transfers (Pivot)", criteria: ["Able to transfer safely with minor use of hands", "Able to transfer safely definite need of hands", "Able to transfer with verbal cueing/supervision", "Needs one person to assist", "Needs two people to assist/supervise"] },
        { name: "Standing eyes closed (10 sec)", criteria: ["Able to stand 10 secs safely", "Able to stand 10 secs with supervision", "Able to stand 3 secs", "Unable to keep eyes closed 3 secs but stays safe", "Needs help to keep from falling"] },
        { name: "Standing feet together", criteria: ["Able to place feet together independently and stand 1 min safely", "Able to place feet together independently and stand 1 min with supervision", "Able to place feet together independently but unable to hold for 30 secs", "Needs help to attain position but able to stand 15 secs", "Needs help to attain position and unable to hold for 15 secs"] },
        { name: "Reaching forward", criteria: ["Can reach forward confidently >25 cm (10 in)", "Can reach forward >12 cm (5 in)", "Can reach forward >5 cm (2 in)", "Reaches forward but needs supervision", "Loses balance while trying/needs external support"] },
        { name: "Pick up object from floor", criteria: ["Able to pick up slipper safely and easily", "Able to pick up slipper but needs supervision", "Unable to pick up but reaches 2-5cm (1-2 in) from slipper independently", "Unable to pick up and needs supervision while trying", "Unable to try/needs assist to keep from falling"] },
        { name: "Turning to look behind", criteria: ["Looks behind from both sides and weight shifts well", "Looks behind one side only; other side shows less weight shift", "Turns sideways only but maintains balance", "Needs supervision when turning", "Needs assist to keep from falling"] },
        { name: "Turn 360 degrees", criteria: ["Able to turn 360 degrees safely in 4 secs or less", "Able to turn 360 degrees safely one side only in 4 secs or less", "Able to turn 360 degrees safely but slowly", "Needs close supervision or verbal cueing", "Needs assistance while turning"] },
        { name: "Stool Stepping (8 times)", criteria: ["Able to stand independently and safely and complete 8 steps in 20 secs", "Able to stand independently and complete 8 steps in >20 secs", "Able to complete 4 steps without assistance with supervision", "Able to complete >2 steps needs minimal assist", "Needs assistance to keep from falling/unable to try"] },
        { name: "Tandem Standing (30 sec)", criteria: ["Able to place foot tandem independently and hold 30 secs", "Able to place foot ahead of other independently and hold 30 secs", "Able to take small step independently and hold 30 secs", "Needs help to step but can hold 15 secs", "Loses balance while stepping or standing"] },
        { name: "Standing on one leg", criteria: ["Able to lift leg independently and hold >10 secs", "Able to lift leg independently and hold 5-10 secs", "Able to lift leg independently and hold ≥3 secs", "Tries to lift leg; unable to hold 3 secs but remains independent", "Unable to try or needs assist to prevent fall"] }
    ];

    function buildForm() {
        const list = document.getElementById('questions-list');
        if(!list) return;
        
        list.innerHTML = ""; 
        document.getElementById('load-error-btn').style.display = 'none';

        bbsData.forEach((item, i) => {
            const qNum = i + 1;
            const block = document.createElement('div');
            block.className = 'question-block';
            block.id = block-q${qNum};

            const optionsHtml = item.criteria.map((text, index) => {
                const score = 4 - index;
                return `
                    <label class="option-item">
                        <input type="radio" name="q${qNum}" value="${score}" onchange="applyClinicalLogic()">
                        <span class="option-text"><span class="score-badge">${score}:</span> ${text}</span>
                    </label>
                `;
            }).join('');

            block.innerHTML = `
                <span class="question-label">${qNum}. ${item.name}</span>
                <div class="options-list">${optionsHtml}</div>
            `;
            list.appendChild(block);
        });
        updateTotal();
    }

    function applyClinicalLogic() {
        // Unlock Q3 first (Standard cleanup)
        document.getElementById('block-q3').classList.remove('locked');

        const q2Val = getVal('q2');

        // Logic A: Q2 is 4 -> Q3 becomes 4 and LOCKS
        if (q2Val === 4) {
            setScore('q3', 4);
            document.getElementById('block-q3').classList.add('locked');
        }

        // Logic B: Q2 is 0 -> Q6 thru Q14 become 0 but UNLOCKED
        if (q2Val === 0) {
            for (let i = 6; i <= 14; i++) {
                setScore('q' + i, 0);
            }
        }
        updateTotal();
    }

    function setScore(name, val) {
        const radios = document.getElementsByName(name);
        radios.forEach(r => { if (parseInt(r.value) === val) r.checked = true; });
    }

    function getVal(name) {
        const r = document.querySelector(input[name="${name}"]:checked);
        return r ? parseInt(r.value) : null;
    }

    function updateTotal() {
        let total = 0;
        let answeredCount = 0;
        let missing = [];

        for (let i = 1; i <= 14; i++) {
            const val = getVal('q' + i);
            if (val !== null) {
                total += val;
                answeredCount++;
            } else {
                missing.push(i);
            }
        }

        document.getElementById('total-score').innerText = total;
        const riskBadge = document.getElementById('risk-status');
        const warn = document.getElementById('incomplete-msg');
        
        if(answeredCount < 14) {
            riskBadge.innerText = "Assessment Incomplete";
            riskBadge.style.backgroundColor = "#bdc3c7";
            warn.innerText = "Unanswered items: " + missing.join(", ");
        } else {
            warn.innerText = "";
            if (total >= 41) {
                riskBadge.innerText = "Low Fall Risk (41-56)";
                riskBadge.style.backgroundColor = "var(--risk-low)";
            } else if (total >= 21) {
                riskBadge.innerText = "Medium Fall Risk (21-40)";
                riskBadge.style.backgroundColor = "var(--risk-med)";
            } else {
                riskBadge.innerText = "High Fall Risk (0-20)";
                riskBadge.style.backgroundColor = "var(--risk-high)";
            }
        }
    }

    function resetCalculator() {
        if(confirm("Are you sure you want to clear all scores?")) {
            document.getElementById('bbsForm').reset();
            applyClinicalLogic();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // Force build on load and display error button if it fails
    window.addEventListener('load', () => {
        buildForm();
        setTimeout(() => {
            if (document.getElementById('questions-list').children.length <= 1) {
                document.getElementById('load-error-btn').style.display = 'block';
            }
        }, 1000);
    });
</script>

</body>
</html>
