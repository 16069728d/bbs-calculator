<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Clinical Calculator | HA PT Department</title>
    <style>
        :root {
            --ha-blue: #007b85; /* Professional Clinical Teal/Blue */
            --bg-light: #f8f9fa;
            --border-color: #dee2e6;
            --locked-bg: #e9ecef;
            --text-main: #212529;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }

        .calculator-card {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .header {
            background-color: var(--ha-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .score-banner {
            position: sticky;
            top: 0;
            background: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid var(--ha-blue);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .item-container { padding: 20px; }

        .question-block {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease-in-out;
        }

        .question-block.locked {
            background-color: var(--locked-bg);
            opacity: 0.6;
            pointer-events: none;
        }

        .question-label {
            font-weight: 600;
            display: block;
            margin-bottom: 12px;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option {
            text-align: center;
            flex: 1;
        }

        .option input { cursor: pointer; }

        .footer-btns {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #f1f3f5;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset { background: #6c757d; color: white; }
        .btn-home { background: var(--ha-blue); color: white; }
        button:hover { filter: brightness(90%); }

        .clinical-hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
            display: block;
        }

        @media (max-width: 480px) {
            .options-row { flex-wrap: wrap; }
            .option { min-width: 18%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>Berg Balance Scale (BBS)</h1>
        <p>Physiotherapy Department - Clinical Decision Support Tool</p>
    </div>

    <div class="score-banner">
        Total Score: <span id="total-score">0</span> / 56
    </div>

    <form id="bbsForm" class="item-container">
        <div id="questions-list"></div>
    </form>

    <div class="footer-btns">
        <button type="button" class="btn-reset" onclick="resetCalculator()">Reset All</button>
        <button type="button" class="btn-home" onclick="window.location.href='https://github.com/16069728d/bbs-calculator'">Back to Home</button>
    </div>
</div>

<script>
    const bbsItems = [
        "Sitting to standing",
        "Standing unsupported (2 min)",
        "Sitting with back unsupported (2 min)",
        "Standing to sitting",
        "Transfers",
        "Standing unsupported with eyes closed (10 sec)",
        "Standing unsupported with feet together",
        "Reaching forward with outstretched arm",
        "Pick up object from floor",
        "Turning to look behind over shoulders",
        "Turn 360 degrees",
        "Place alternate foot on step (8 times)",
        "Standing unsupported one foot in front",
        "Standing on one leg"
    ];

    const questionsList = document.getElementById('questions-list');

    // Initialize the UI
    function init() {
        bbsItems.forEach((text, i) => {
            const qNum = i + 1;
            const block = document.createElement('div');
            block.className = 'question-block';
            block.id = block-q${qNum};

            let hint = "";
            if(qNum === 2) hint = "Score 4 auto-fills Item 3.";
            if(qNum === 6) hint = "Requires Q2 > 0.";

            block.innerHTML = `
                <span class="question-label">${qNum}. ${text}</span>
                <div class="options-row">
                    ${[0, 1, 2, 3, 4].map(val => `
                        <div class="option">
                            <input type="radio" name="q${qNum}" value="${val}" onchange="applyClinicalLogic()">
                            <br><small>${val}</small>
                        </div>
                    `).join('')}
                </div>
                ${hint ? <span class="clinical-hint">${hint}</span> : ''}
            `;
            questionsList.appendChild(block);
        });
    }

    function applyClinicalLogic() {
        const form = document.forms['bbsForm'];
        
        // 1. REFRESH ALL STATES (Technical bug fix: prevents locking malfunction)
        for (let i = 1; i <= 14; i++) {
            const block = document.getElementById(block-q${i});
            block.classList.remove('locked');
            // We only unlock, we don't clear values here to allow the user to see what they picked
        }

        // Get current values
        const q2Val = getRadioValue('q2');

        // 2. CLINICAL RULE: If Q2 (Standing) is 4 -> Q3 (Sitting) is 4 & Locked
        if (q2Val === 4) {
            setAndLock('q3', 4);
        }

        // 3. CLINICAL RULE: If Q2 (Standing) is 0 -> Dynamic standing (Q6-Q14) are 0 & Locked
        if (q2Val === 0) {
            for (let i = 6; i <= 14; i++) {
                setAndLock('q' + i, 0);
            }
        }

        // Note: Q3 -> Global zero logic removed to allow for MSK clinical judgment as requested.

        updateTotal();
    }

    function setAndLock(name, value) {
        const radios = document.getElementsByName(name);
        const block = document.getElementById(block-${name});
        
        radios.forEach(r => {
            r.checked = (parseInt(r.value) === value);
        });
        block.classList.add('locked');
    }

    function getRadioValue(name) {
        const radio = document.querySelector(input[name="${name}"]:checked);
        return radio ? parseInt(radio.value) : null;
    }

    function updateTotal() {
        let total = 0;
        const checkedOptions = document.querySelectorAll('input[type="radio"]:checked');
        checkedOptions.forEach(opt => {
            total += parseInt(opt.value);
        });
        document.getElementById('total-score').innerText = total;
    }

    function resetCalculator() {
        document.getElementById('bbsForm').reset();
        // Clear all locked styles
        for (let i = 1; i <= 14; i++) {
            document.getElementById(block-q${i}).classList.remove('locked');
        }
        updateTotal();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    init();
</script>

</body>
</html>
